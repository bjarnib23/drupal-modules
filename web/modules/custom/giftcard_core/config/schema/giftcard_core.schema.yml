giftcard_core.settings:
  type: config_object
  label: 'Gift Card settings'
  mapping:
    rapyd_access_key_id:
      type: string
      label: 'Rapyd access key (Key module key ID)'
    rapyd_secret_key_id:
      type: string
      label: 'Rapyd secret key (Key module key ID)'
    rapyd_sandbox:
      type: boolean
      label: 'Use Rapyd sandbox environment'
    rapyd_country:
      type: string
      label: 'Country code (ISO 3166-1 alpha-2)'
    currency:
      type: string
      label: 'Currency code (ISO 4217)'
    min_amount:
      type: integer
      label: 'Minimum gift card amount'
    flood_threshold:
      type: integer
      label: 'Max checkout attempts per hour per IP'
