booking_core.settings:
  type: config_object
  label: 'Booking Core settings'
  mapping:
    company_name:
      type: string
      label: 'Company name'
    admin_email:
      type: email
      label: 'Admin notification email'
    services:
      type: sequence
      label: 'Services'
      sequence:
        type: string
        label: 'Service'
    open_days:
      type: sequence
      label: 'Open days'
      sequence:
        type: integer
        label: 'Day'
    open_time:
      type: string
      label: 'Opening time'
    close_time:
      type: string
      label: 'Closing time'
    slot_duration:
      type: integer
      label: 'Slot duration in minutes'
    weeks_ahead:
      type: integer
      label: 'Weeks ahead'
